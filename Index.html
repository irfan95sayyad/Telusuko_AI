<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telusuko AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:#f8fafc;
}
#stopBtn{
    background:#e8e0e1;
}
.markdown-content table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
.markdown-content pre {
    background: #0d1117 !important;
    color: #ffffff !important;
}

.markdown-content pre code {
    color: #ffffff !important;
    text-shadow: none;
}
.markdown-content th,
.markdown-content td{
    border:1px solid #0ff3e8dd;
    padding:10px;
}

.markdown-content h1,
.markdown-content h2,
.markdown-content h3{
    color:#2563eb;
}
.hero{
    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:#fff;
    display:flex;
    align-items:center;
    text-align:center;
}
.logo{
    width:180px;
    height:180px;
    object-fit:contain;
    background:#fff;
    border-radius:50%;
    padding:12px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
}
.search-wrap{
    max-width:900px;
    margin:30px auto;
    background:#fff;
    border-radius:60px;
    padding:10px;
    display:flex;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}
.search-wrap input{
    flex:1;
    border:none;
    outline:none;
    font-size:18px;
    padding:14px;
}
.icon-btn{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    color:#fff;
}
#micBtn{background:#f59e0b;}
#sendBtn{background:#2563eb;}
.prompt{
    display:inline-block;
    margin:5px;
    padding:10px 16px;
    border-radius:30px;
    background:rgba(255,255,255,.15);
    cursor:pointer;
}
.response-card{
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}
.markdown-content pre{
    background:#0d1117;
    border-radius:12px;
    padding:15px;
    overflow-x:auto;
    margin:15px 0;
}

.markdown-content pre code{
    background:none;
    color:inherit;
    padding:0;
    font-size:14px;
    line-height:1.6;
}

.footer{
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<section class="hero">
<div class="container">
<img src="telusuko.png" class="logo mb-4" alt="Telusuko AI">
<h1 class="display-3 fw-bold">🤖 Telusuko AI</h1>
<p class="lead">Your Personal AI Mentor for Every Subject</p>
<p>Ask Anything. Learn Everything.</p>

<div class="search-wrap">
<input type="text" id="question" placeholder="Telusuko...">
<button class="icon-btn me-2" id="micBtn">
    <i class="fas fa-microphone"></i>
</button>

<button class="icon-btn me-2" id="stopBtn">
    <i class="fas fa-volume-xmark"></i>
</button>

<button class="icon-btn" id="sendBtn">
    <i class="fas fa-paper-plane"></i>
</button>
</div>

<div>
<span class="prompt">Cloud Computing</span>
<span class="prompt">OSI Model</span>
<span class="prompt">Supervised Learning</span>
<span class="prompt">PHP Login System</span>
<span class="prompt">GitHub Pages</span>
</div>
</div>
</section>

<section class="py-5">
<div class="container">
<div id="responseArea" class="response-card">
<h4>🤖 Telusuko AI</h4>
<p>Curious about something? అడగండి! </p>
</div>
</div>
</section>


<div class="footer">© 2026 Telusuko AI AI | Developed by Irfan Sayyad</div>

<script>
const responseArea=document.getElementById('responseArea');
const questionInput=document.getElementById('question');
let recognition;

async function askWebGenie(question){
responseArea.innerHTML='<h4>🤖 WebGenie</h4><p>Thinking...</p>';

try{
const response=await fetch('https://cloud.flowiseai.com/api/v1/prediction/28af105b-fb90-47ed-a669-fdf2a0398160',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({question:question})
});

const data=await response.json();

const answer=data.text || data.answer || data.output || JSON.stringify(data);

responseArea.innerHTML=`
<div class="response-card">
<h4>🤖 WebGenie</h4>
<div class="markdown-content">
${marked.parse(answer)}
</div>
</div>`;

document.querySelectorAll('pre code').forEach((el)=>{
    hljs.highlightElement(el);
});

window.speechSynthesis.cancel();

const cleanAnswer = answer
.replace(/```[\s\S]*?```/g,'')
.replace(/[#*`]/g,'');

const shortAnswer = cleanAnswer.substring(0,300);

const speech = new SpeechSynthesisUtterance(shortAnswer);

speech.lang='en-US';
speech.rate=1;

window.speechSynthesis.speak(speech);

}catch(err){
responseArea.innerHTML='<h4>❌ Error</h4><p>Unable to connect to Flowise.</p>';
}
}

document.getElementById('sendBtn').onclick=()=>{
if(questionInput.value.trim()) askWebGenie(questionInput.value.trim());
};

questionInput.addEventListener('keypress',e=>{
if(e.key==='Enter' && questionInput.value.trim()) askWebGenie(questionInput.value.trim());
});

document.querySelectorAll('.prompt').forEach(p=>{
p.onclick=()=>{
questionInput.value=p.innerText;
askWebGenie(p.innerText);
};
});

const SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){
recognition=new SpeechRecognition();
recognition.lang='en-US';

document.getElementById('micBtn').onclick=()=>recognition.start();

recognition.onresult=(event)=>{
const text=event.results[0][0].transcript;
questionInput.value=text;
askWebGenie(text);
};
document.getElementById('stopBtn').onclick=()=>{

    window.speechSynthesis.cancel();

    if(recognition){
        recognition.stop();
    }

};
}
</script>
</body>
</html>
